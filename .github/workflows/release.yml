name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish-and-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: Detect version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION="$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            PREVIOUS_VERSION=""
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT_VERSION); skipping publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version bumped: $PREVIOUS_VERSION -> $CURRENT_VERSION"
          fi

      - name: Check if version is already published on npm
        id: npm_check
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ steps.version.outputs.package_name }}"
          VER="${{ steps.version.outputs.version }}"

          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PKG}@${VER} already on npm; will skip publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true' && steps.npm_check.outputs.already_published == 'false'
        run: npm install

      - name: Enforce OIDC-only npm auth
        if: steps.version.outputs.changed == 'true' && steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail

          # Remove any injected legacy token auth; Trusted Publishing must use OIDC.
          unset NODE_AUTH_TOKEN NPM_TOKEN

          if [[ -n "${NPM_CONFIG_USERCONFIG:-}" && -f "${NPM_CONFIG_USERCONFIG}" ]]; then
            sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG}" || true
          fi

          OIDC_NPMRC="$RUNNER_TEMP/npmrc-oidc"
          {
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=false"
          } > "$OIDC_NPMRC"

          echo "NPM_CONFIG_USERCONFIG=$OIDC_NPMRC" >> "$GITHUB_ENV"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true' && steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          npm publish --access public --provenance

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
