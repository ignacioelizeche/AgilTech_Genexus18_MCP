name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - .github/workflows/release.yml

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Detect version bump
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_NAME="$(node -p "require('./package.json').name")"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION="$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            PREVIOUS_VERSION=""
          fi

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$CURRENT_VERSION" == "$PREVIOUS_VERSION" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check if version is already published on npm
        id: npm_check
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PKG="${{ steps.version.outputs.package_name }}"
          VER="${{ steps.version.outputs.version }}"

          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true' && steps.npm_check.outputs.already_published == 'false'
        run: npm install

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true' && steps.npm_check.outputs.already_published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Force Trusted Publishing (OIDC) even if a legacy NODE_AUTH_TOKEN exists in repo/org secrets.
          unset NODE_AUTH_TOKEN
          npm publish --access public --provenance

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: false
